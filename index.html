<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 2 — GLSL</title>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/glslCanvas@0.2.6/dist/GlslCanvas.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="myCanvas" data-fragment-url="shader.frag"></canvas>

  <script>
    // Initialize GlslCanvas manually so we can control its size
    const canvas = document.getElementById('myCanvas');
    const sandbox = new GlslCanvas(canvas);

    // Force the internal WebGL resolution to match the window exactly
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    
    window.addEventListener('resize', resize);
    resize(); // Call it once on load
  </script>

</body>
</html>
