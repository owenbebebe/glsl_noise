<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 2 — GLSL</title>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/glslCanvas@0.2.6/dist/GlslCanvas.js"></script>
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden; /* Prevent scrollbars */
      background-color: #000;
    }
    
    canvas {
      display: block; /* Removes the bottom text baseline gap */
      width: 100vw;   /* Force CSS to fill the viewport width */
      height: 100vh;  /* Force CSS to fill the viewport height */
    }
  </style>
</head>
<body>

  <canvas id="myCanvas" data-fragment-url="shader.frag"></canvas>

  <script>
    const canvas = document.getElementById('myCanvas');
    const sandbox = new GlslCanvas(canvas);

    function resize() {
      // 2. Get the screen's actual pixel density
      const dpr = window.devicePixelRatio || 1;
      
      // 3. Set the internal WebGL buffer size to match the physical pixels
      // (The CSS '100vw/100vh' handles the visual size on screen)
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
    }
    
    window.addEventListener('resize', resize);
    resize();
  </script>

</body>
</html>
